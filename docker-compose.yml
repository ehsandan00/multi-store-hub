services:
  postgres:
    image: postgres:16-alpine
    container_name: msh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: multi_store_hub
    ports:
      - "5432:5432"
    volumes:
      - msh-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d multi_store_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: msh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - msh-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  msh-postgres-data:
  msh-redis-data:
